name: Feature Request
description: Suggest an idea for NeuralPulse
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or gap does this feature address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about.
  - type: checkboxes
    id: contribution
    attributes:
      label: Would you contribute this?
      options:
        - label: Yes, I'd like to build this
