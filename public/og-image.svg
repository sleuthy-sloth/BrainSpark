<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#12122a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="rgba(74,158,255,0.06)"/>
  <circle cx="1100" cy="530" r="200" fill="rgba(167,139,250,0.05)"/>
  <circle cx="600" cy="315" r="250" fill="rgba(52,211,153,0.03)"/>
  <!-- Brand -->
  <text x="600" y="240" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="72" font-weight="800" fill="url(#accent)" text-anchor="middle">NeuralPulse</text>
  <text x="600" y="310" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="28" fill="#a0a0c0" text-anchor="middle">Daily Brain Training</text>
  <!-- Stars / game icons -->
  <text x="250" y="420" font-size="36" text-anchor="middle" fill="#4a9eff" opacity="0.6">∑</text>
  <text x="400" y="420" font-size="36" text-anchor="middle" fill="#34d399" opacity="0.6">◆</text>
  <text x="550" y="420" font-size="36" text-anchor="middle" fill="#fb7185" opacity="0.6">◉</text>
  <text x="650" y="420" font-size="36" text-anchor="middle" fill="#fbbf24" opacity="0.6">⚡</text>
  <text x="750" y="420" font-size="36" text-anchor="middle" fill="#a78bfa" opacity="0.6">✦</text>
  <text x="900" y="420" font-size="36" text-anchor="middle" fill="#22d3ee" opacity="0.6">◈</text>
  <!-- Tagline -->
  <text x="600" y="500" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="18" fill="#6b6b8d" text-anchor="middle">Sharpen your edge — neuralpulse.app</text>
</svg>
